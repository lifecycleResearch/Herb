<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="30" cy="30" r="28" stroke="var(--color-primary)" stroke-width="2" fill="none"/>
  <!-- Recycling arrows (three arrows in a loop) -->
